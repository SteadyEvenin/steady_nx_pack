# =============================================================================
#  .github/workflows/release.yml
#
#  Builds a Nintendo Switch CFW SD-card pack and publishes it as a GitHub
#  Release with a component changelog and a downloadable zip.
#
#  Triggers
#  ────────
#  • Push of any tag matching v*         (e.g. v1.2.3)
#  • Manual dispatch via "Run workflow"  (auto-generates a dated version tag)
#    └─ optional input: version_tag – override the auto-generated name
# =============================================================================

name: Build and Release CFW Pack

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      version_tag:
        description: >
          Version tag override (optional).
          Leave blank to auto-generate: v[YYYY.MM.DD]-build.[run].[attempt]-[sha7]
        required: false
        default: ''

# ── Global defaults ─────────────────────────────────────────────────────────
# Explicit shell ensures consistent behaviour across all run steps.
defaults:
  run:
    shell: bash

# ── Concurrency ──────────────────────────────────────────────────────────────
# One release pipeline at a time per ref.  A new push cancels any in-progress
# run on the same ref so rapid tag pushes never race into a half-built release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

# ── Permissions ──────────────────────────────────────────────────────────────
# contents: write  — required to create releases and upload release assets.
# All other permissions are intentionally omitted (GitHub treats omitted
# permissions as "none"; setting them explicitly to "none" is not valid syntax).
permissions:
  contents: write

# =============================================================================
#  JOB 1 — build
#
#  • Runs build_nx_pack.sh
#  • Verifies the output is non-empty
#  • Determines and stamps the version tag
#  • Packages the SD card layout into a zip (using `.` — no glob expansion)
#  • Carves a release-body excerpt from CHANGELOG.md (strips the SD tree)
#  • Uploads the zip and the release-body excerpt as separate named artifacts
#    so the release job — running on a fresh runner — can consume both
#  • Writes a job summary visible on the Actions run page
# =============================================================================
jobs:
  build:
    name: Build SD Card Pack
    runs-on: ubuntu-latest
    timeout-minutes: 30          # build_nx_pack.sh: 23 process steps + 2 Ultrahand companion assets + mesosphere

    outputs:
      version:      ${{ steps.version.outputs.tag }}
      artifact_zip: SD_Card_Package-${{ steps.version.outputs.tag }}
      artifact_body: release-body-${{ steps.version.outputs.tag }}

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Dependencies ────────────────────────────────────────────────────
      # curl / unzip / python3 are pre-installed on ubuntu-latest.
      # Only `zip` (used to package the SD output) needs adding.
      - name: Install zip
        run: sudo apt-get install -y -qq zip

      # ── 3. Build ───────────────────────────────────────────────────────────
      - name: Run build script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTPUT_DIR:   ${{ github.workspace }}/SD_Card_Output
        run: |
          chmod +x build_nx_pack.sh
          ./build_nx_pack.sh "$OUTPUT_DIR"

      # ── 4. Sanity-check output ─────────────────────────────────────────────
      # Fail fast if the build produced nothing rather than zipping and
      # publishing an empty archive.
      - name: Verify output is non-empty
        run: |
          count=$(find "${{ github.workspace }}/SD_Card_Output" \
                       -mindepth 1 -maxdepth 1 | wc -l)
          if [[ "$count" -eq 0 ]]; then
            echo "::error::SD_Card_Output is empty — build_nx_pack.sh may have failed silently."
            exit 1
          fi
          echo "Output: $count top-level entries."

      # ── 5. Version tag ─────────────────────────────────────────────────────
      # Priority: tag-push ref_name → manual input → auto-generated datestamp.
      # run_attempt is appended to the auto-generated name so a re-run of the
      # same workflow run produces a unique tag rather than colliding with or
      # silently overwriting the previous attempt.
      - name: Determine version tag
        id: version
        env:
          INPUT_TAG: ${{ github.event.inputs.version_tag }}
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
          elif [[ -n "$INPUT_TAG" ]]; then
            TAG="$INPUT_TAG"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            TAG="v$(date -u +'%Y.%m.%d')-build.${{ github.run_number }}.${{ github.run_attempt }}-${SHORT_SHA}"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${TAG}"

      # ── 6. Stamp version into CHANGELOG.md ────────────────────────────────
      # Anchored substitution (^ … $) prevents double-stamping on re-runs.
      - name: Stamp version into changelog
        run: |
          CHANGELOG="${{ github.workspace }}/SD_Card_Output/CHANGELOG.md"
          TAG="${{ steps.version.outputs.tag }}"

          if [[ ! -f "$CHANGELOG" ]]; then
            echo "::error::CHANGELOG.md not found at $CHANGELOG"
            exit 1
          fi

          sed -i "s|^# CFW Pack Changelog$|# CFW Pack Changelog (${TAG})|" "$CHANGELOG"
          echo "Stamped CHANGELOG.md with ${TAG}"

      # ── 7. Carve release body ──────────────────────────────────────────────
      # The full CHANGELOG.md ends with a large "## SD Card Layout" code block
      # that renders poorly in a GitHub release description.  We extract only
      # the header + component table (+ optional failed list) into a separate
      # file used as the release body.  The complete changelog travels inside
      # the zip so it's always available on the release page as a download.
      - name: Extract release body from changelog
        run: |
          CHANGELOG="${{ github.workspace }}/SD_Card_Output/CHANGELOG.md"
          RELEASE_BODY="${{ github.workspace }}/release_body.md"

          # Copy every line up to (but not including) the "## SD Card Layout"
          # section.  sed -n with a range address + p prints matching lines.
          sed -n '1,/^## SD Card Layout$/{ /^## SD Card Layout$/!p }' \
              "$CHANGELOG" > "$RELEASE_BODY"

          # Trim any trailing blank lines / horizontal rules for a clean ending
          perl -i -0pe 's/[\n\r\s]*$//; print "\n"' "$RELEASE_BODY"

          echo "Release body (${RELEASE_BODY}):"
          echo "─────────────────────────────────"
          cat "$RELEASE_BODY"

      # ── 8. Package ─────────────────────────────────────────────────────────
      # zip . (dot, not *) includes hidden directories like switch/.overlays
      # without relying on `shopt -s dotglob` or shell glob expansion at all.
      # IMPORTANT: do NOT use --exclude "*.zip" here — config/ultrahand/.sounds/
      # default.zip is a legitimate payload file that must travel in the package.
      # Instead we move the output zip outside SD_Card_Output before zipping so
      # it can never be accidentally included.
      - name: Compress SD Card Output
        run: |
          cd "${{ github.workspace }}/SD_Card_Output"
          zip -r "${{ github.workspace }}/SD_Card_Package.zip" .
          echo "Package size: $(du -sh "${{ github.workspace }}/SD_Card_Package.zip" | cut -f1)"

      # ── 9. Upload zip artifact ─────────────────────────────────────────────
      # Named with the version tag so the release job can reference it
      # unambiguously even if multiple runs are queued.
      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: SD_Card_Package-${{ steps.version.outputs.tag }}
          path: ${{ github.workspace }}/SD_Card_Package.zip
          retention-days: 7
          if-no-files-found: error

      # ── 10. Upload release body artifact ───────────────────────────────────
      # The release job runs on a fresh runner that has no access to the build
      # job's filesystem.  Passing the changelog path via job outputs would
      # point to a non-existent path on the release runner.  Upload it as an
      # artifact and download it in the release job instead.
      - name: Upload release body artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-body-${{ steps.version.outputs.tag }}
          path: ${{ github.workspace }}/release_body.md
          retention-days: 7
          if-no-files-found: error

      # ── 11. Job summary ────────────────────────────────────────────────────
      # Renders a status panel on the Actions run page — visible without
      # navigating to the release.  Runs even if a prior step failed so you
      # can see partial results.
      - name: Write job summary
        if: always()
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ZIP="${{ github.workspace }}/SD_Card_Package.zip"
          BODY="${{ github.workspace }}/release_body.md"

          {
            echo "## CFW Pack Build — \`${TAG:-unknown}\`"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Triggered by | \`${{ github.event_name }}\` |"
            echo "| Commit | [\`$(echo '${{ github.sha }}' | cut -c1-7)\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |"
            echo "| Run | [#${{ github.run_number }}.${{ github.run_attempt }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            if [[ -f "$ZIP" ]]; then
              echo "| Package size | \`$(du -sh "$ZIP" | cut -f1)\` |"
            fi
            echo ""
            if [[ -f "$BODY" ]]; then
              echo "<details><summary>Release notes preview</summary>"
              echo ""
              cat "$BODY"
              echo ""
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

# =============================================================================
#  JOB 2 — release
#
#  Runs only after build succeeds.  Downloads both artifacts produced by the
#  build job (the zip + the release body) and publishes a GitHub Release.
#
#  Keeping this as a separate job means a transient API failure (rate limit,
#  network blip) can be re-run in seconds without repeating the full build.
# =============================================================================
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      # Download both artifacts into the workspace.
      # download-artifact with no `path` set places each named artifact in
      # its own subdirectory: ./SD_Card_Package-<tag>/SD_Card_Package.zip
      # and ./release-body-<tag>/release_body.md
      - name: Download zip artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_zip }}
          path: ${{ github.workspace }}/dl/zip

      - name: Download release body artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_body }}
          path: ${{ github.workspace }}/dl/body

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:         ${{ needs.build.outputs.version }}
          name:             steady_nx_pack ${{ needs.build.outputs.version }}
          body_path:        ${{ github.workspace }}/dl/body/release_body.md
          draft:            false
          prerelease:       false
          target_commitish: ${{ github.sha }}
          make_latest:      true
          files: |
            ${{ github.workspace }}/dl/zip/SD_Card_Package.zip
